<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="shortcut icon" href="logo-park.PNG" type="image/x-icon">
    <link rel="apple-touch-icon" href="./logo.jpg">
    <title>Consulta de placas</title>
</head>
<body>
    <div class="topo">🚗 Controle de Estacionamento</div><!--<img src="logo-branco.jpg" alt="logo branco">--></div>

    <div class="container">
        <div class="painel">
            <!-- INPUT -->
            <div class="input-box">
                <input id="inputPlaca" placeholder="Digite a placa do veículo ex: WEL1986">
                <button onclick="consultar()">Consultar</button>
                <!-- BOTÃO LIMPAR -->
                <button id="btn-Limpar" onclick="limpar()">Limpar</button>
            </div>
   
            <div id="loading"></div>
            <br>
            <!-- RESULTADO -->
            <div id="resultado"></div>

            <!-- HISTÓRICO 
            <div class="historico">
                <h3>Últimas consultas:</h3>
                <div id="historico"></div>
            </div>-->

               <!-- HISTÓRICO -->
            <div class="historico">
                <div class="historico-topo">
                    <h3>Últimas consultas:</h3>
                    <button id="toggleHistorico">🔽</button>
                </div>
                <div id="historico" class="historico-conteudo"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="service-worker.js"></script>
</body>
</html>
